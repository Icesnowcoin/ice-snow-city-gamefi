input {
  # 应用日志
  file {
    path => "/var/log/ice-snow-city/app.log"
    start_position => "beginning"
    codec => json
    tags => ["app"]
  }

  # 系统日志
  file {
    path => "/var/log/syslog"
    start_position => "beginning"
    tags => ["system"]
  }

  # 数据库日志
  file {
    path => "/var/log/mysql/error.log"
    start_position => "beginning"
    tags => ["database"]
  }

  # Nginx 访问日志
  file {
    path => "/var/log/nginx/access.log"
    start_position => "beginning"
    codec => multiline {
      pattern => "^\["
      negate => true
      what => "previous"
    }
    tags => ["nginx", "access"]
  }

  # Nginx 错误日志
  file {
    path => "/var/log/nginx/error.log"
    start_position => "beginning"
    tags => ["nginx", "error"]
  }
}

filter {
  # 解析应用日志
  if "app" in [tags] {
    json {
      source => "message"
      target => "app_data"
    }

    if [app_data][timestamp] {
      date {
        match => ["[app_data][timestamp]", "ISO8601"]
        target => "@timestamp"
      }
    }

    # 提取关键字段
    mutate {
      add_fields => {
        "service" => "ice-snow-city"
        "environment" => "${ENVIRONMENT:production}"
      }
    }
  }

  # 解析系统日志
  if "system" in [tags] {
    grok {
      match => { "message" => "%{SYSLOGLINE}" }
    }
  }

  # 解析数据库日志
  if "database" in [tags] {
    grok {
      match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} %{INT:thread_id} \[%{DATA:severity}\] %{GREEDYDATA:message}" }
    }

    if [severity] == "ERROR" {
      mutate {
        add_tags => ["db_error"]
      }
    }
  }

  # 解析 Nginx 访问日志
  if "nginx" in [tags] and "access" in [tags] {
    grok {
      match => { "message" => "%{COMBINEDAPACHELOG}" }
    }

    # 转换字段类型
    mutate {
      convert => {
        "bytes" => "integer"
        "response" => "integer"
      }
    }

    # 计算响应时间
    if [request_time] {
      mutate {
        convert => { "request_time" => "float" }
      }
    }
  }

  # 添加通用字段
  mutate {
    add_fields => {
      "hostname" => "${HOSTNAME}"
      "datacenter" => "${DATACENTER:us-east-1}"
    }
  }

  # 移除敏感信息
  mutate {
    remove_field => ["password", "token", "secret", "api_key"]
  }
}

output {
  # 输出到 Elasticsearch
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOST:localhost:9200}"]
    index => "ice-snow-city-%{+YYYY.MM.dd}"
    user => "${ELASTICSEARCH_USER:elastic}"
    password => "${ELASTICSEARCH_PASSWORD:changeme}"
    ssl => true
    ssl_certificate_verification => false
  }

  # 输出到文件（备份）
  file {
    path => "/var/log/ice-snow-city/aggregated.log"
    codec => json
  }

  # 输出到 stdout（调试）
  if [@metadata][debug] {
    stdout {
      codec => json
    }
  }
}
